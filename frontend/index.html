<!doctype html>
<html lang="en">
    <head>
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "PiNNED",
                "url": "https://pinned.ishpeeedy.dev",
                "description": "A visual pinboard workspace for your thoughts, links, and images. Organize freely on an infinite canvas with AI-powered search.",
                "applicationCategory": "ProductivityApplication",
                "author": {
                    "@type": "Person",
                    "name": "Anuj Sharma",
                    "url": "https://ishpeeedy.dev"
                }
            }
        </script>
        <meta charset="UTF-8" />
        <script>
            (function () {
                var stored = localStorage.getItem('darkMode');
                var isDark =
                    stored !== null
                        ? stored === 'true'
                        : window.matchMedia('(prefers-color-scheme: dark)')
                              .matches;
                if (isDark) document.documentElement.classList.add('dark');
            })();
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Primary -->
        <title>PiNNED | Infinite Canvas Workspace</title>
        <meta
            name="description"
            content="A visual pinboard workspace for your thoughts, links, and images. Organize freely on an infinite canvas with AI-powered search. Built by Anuj Sharma."
        />
        <link rel="icon" type="image/svg" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/favicon.svg" />
        <meta
            name="theme-color"
            content="#eee6fe"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#332352"
            media="(prefers-color-scheme: dark)"
        />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://pinned.ishpeeedy.dev" />
        <meta
            property="og:title"
            content="PiNNED | Infinite Canvas Workspace"
        />
        <meta
            property="og:description"
            content="A visual pinboard workspace for your thoughts, links, and images. Organize freely on an infinite canvas with AI-powered search."
        />
        <meta
            property="og:image"
            content="https://res.cloudinary.com/dzwjyg2ai/image/upload/v1774101702/IMP_Resources/PiNNED-og-image_w75hkz.png"
        />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="PiNNED | Infinite Canvas Workspace"
        />
        <meta
            name="twitter:description"
            content="A visual pinboard workspace for your thoughts, links, and images. Organize freely on an infinite canvas with AI-powered search."
        />
        <meta
            name="twitter:image"
            content="https://res.cloudinary.com/dzwjyg2ai/image/upload/v1774101702/IMP_Resources/PiNNED-og-image_w75hkz.png"
        />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
